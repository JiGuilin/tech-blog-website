<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ngrok-skip-browser-warning" content="true">
    <meta name="description" content="博客系统运行状态监控 - 实时服务健康检查">
    <meta name="keywords" content="系统状态，监控，健康检查">
    <meta property="og:title" content="系统状态 | Status">
    <meta property="og:description" content="实时服务健康检查">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>系统状态 | Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --border: #30363d;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* 页面头部 */
        .page-header {
            text-align: center;
            padding: 3rem 0;
        }
        
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        /* 状态卡片 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s;
        }
        
        .status-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.2);
        }
        
        .status-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .status-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .status-icon.success { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .status-icon.warning { background: rgba(210, 153, 34, 0.2); color: var(--warning); }
        .status-icon.danger { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
        
        .status-title {
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: auto;
        }
        
        .status-badge.online { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .status-badge.offline { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
        
        .status-details {
            display: grid;
            gap: 1rem;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: 8px;
        }
        
        .status-label {
            color: var(--text-secondary);
        }
        
        .status-value {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        /* 日志区域 */
        .log-section {
            margin-top: 3rem;
        }
        
        .log-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .log-content {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-line {
            margin-bottom: 0.5rem;
            padding: 0.3rem;
            border-left: 3px solid var(--accent);
            padding-left: 0.5rem;
        }
        
        .log-time {
            color: var(--text-secondary);
            margin-right: 0.5rem;
        }
        
        .log-success { color: var(--success); }
        .log-error { color: var(--danger); }
        .log-warning { color: var(--warning); }
        
        /* 刷新按钮 */
        .refresh-btn {
            background: var(--gradient);
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <header class="page-header">
            <h1><i class="fas fa-heartbeat"></i> 系统状态监控</h1>
            <p>实时监控博客系统运行状态</p>
            <button class="refresh-btn" onclick="refreshStatus()" style="margin: 2rem auto;">
                <i class="fas fa-sync-alt"></i> 刷新状态
            </button>
        </header>

        <!-- 状态网格 -->
        <div class="status-grid">
            <!-- HTTP 服务器 -->
            <div class="status-card">
                <div class="status-header">
                    <div class="status-icon success">
                        <i class="fas fa-server"></i>
                    </div>
                    <span class="status-title">HTTP 服务器</span>
                    <span class="status-badge online" id="http-status">检查中...</span>
                </div>
                <div class="status-details">
                    <div class="status-item">
                        <span class="status-label">端口</span>
                        <span class="status-value">8080</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">进程 PID</span>
                        <span class="status-value" id="http-pid">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">运行时间</span>
                        <span class="status-value" id="http-uptime">-</span>
                    </div>
                </div>
            </div>

            <!-- Ngrok 隧道 -->
            <div class="status-card">
                <div class="status-header">
                    <div class="status-icon success">
                        <i class="fas fa-link"></i>
                    </div>
                    <span class="status-title">Ngrok 隧道</span>
                    <span class="status-badge online" id="ngrok-status">检查中...</span>
                </div>
                <div class="status-details">
                    <div class="status-item">
                        <span class="status-label">状态</span>
                        <span class="status-value" id="ngrok-status-text">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">外部 URL</span>
                        <span class="status-value" id="ngrok-url">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">响应时间</span>
                        <span class="status-value" id="ngrok-latency">-</span>
                    </div>
                </div>
            </div>

            <!-- 博客系统 -->
            <div class="status-card">
                <div class="status-header">
                    <div class="status-icon success">
                        <i class="fas fa-newspaper"></i>
                    </div>
                    <span class="status-title">博客系统</span>
                    <span class="status-badge online" id="blog-status">检查中...</span>
                </div>
                <div class="status-details">
                    <div class="status-item">
                        <span class="status-label">文章数量</span>
                        <span class="status-value" id="blog-count">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">最新文章</span>
                        <span class="status-value" id="blog-latest">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">下次更新</span>
                        <span class="status-value" id="blog-next">-</span>
                    </div>
                </div>
            </div>

            <!-- 监控脚本 -->
            <div class="status-card">
                <div class="status-header">
                    <div class="status-icon success">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <span class="status-title">监控脚本</span>
                    <span class="status-badge online" id="monitor-status">检查中...</span>
                </div>
                <div class="status-details">
                    <div class="status-item">
                        <span class="status-label">检查间隔</span>
                        <span class="status-value">30 秒</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">最后检查</span>
                        <span class="status-value" id="monitor-last">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">自动重启</span>
                        <span class="status-value">已启用</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志区域 -->
        <section class="log-section">
            <div class="log-container">
                <div class="log-header">
                    <h2><i class="fas fa-terminal"></i> 系统日志</h2>
                    <button class="refresh-btn" onclick="refreshLogs()" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                        <i class="fas fa-sync-alt"></i> 刷新日志
                    </button>
                </div>
                <div class="log-content" id="log-content">
                    <div class="log-line">
                        <span class="log-time">[系统]</span>
                        <span>正在加载日志...</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer>
            <p>© 2026 技术博客自动化系统 · 实时监控</p>
            <p style="margin-top: 0.5rem; font-size: 0.85rem;">
                最后更新：<span id="last-update">-</span>
            </p>
        </footer>
    </div>

    <script>
        // 检查 HTTP 服务器
        async function checkHttpServer() {
            try {
                const start = Date.now();
                const response = await fetch('/');
                const latency = Date.now() - start;
                
                if (response.ok) {
                    document.getElementById('http-status').textContent = '在线';
                    document.getElementById('http-status').className = 'status-badge online';
                    document.getElementById('http-pid').textContent = '运行中';
                    document.getElementById('http-uptime').textContent = '正常';
                    return true;
                }
            } catch (e) {
                document.getElementById('http-status').textContent = '离线';
                document.getElementById('http-status').className = 'status-badge offline';
            }
            return false;
        }

        // 检查 Ngrok
        async function checkNgrok() {
            try {
                const start = Date.now();
                const response = await fetch('https://imply-carotidal-velda.ngrok-free.dev/');
                const latency = Date.now() - start;
                
                if (response.ok) {
                    document.getElementById('ngrok-status').textContent = '在线';
                    document.getElementById('ngrok-status').className = 'status-badge online';
                    document.getElementById('ngrok-status-text').textContent = '正常';
                    document.getElementById('ngrok-url').textContent = 'imply-carotidal-velda.ngrok-free.dev';
                    document.getElementById('ngrok-latency').textContent = latency + 'ms';
                    return true;
                }
            } catch (e) {
                document.getElementById('ngrok-status').textContent = '离线';
                document.getElementById('ngrok-status').className = 'status-badge offline';
            }
            return false;
        }

        // 检查博客系统
        async function checkBlog() {
            try {
                const response = await fetch('blog-list.json');
                if (response.ok) {
                    const posts = await response.json();
                    document.getElementById('blog-status').textContent = '正常';
                    document.getElementById('blog-status').className = 'status-badge online';
                    document.getElementById('blog-count').textContent = posts.length + ' 篇';
                    document.getElementById('blog-latest').textContent = posts[0]?.date || '-';
                    document.getElementById('blog-next').textContent = '明天 09:00';
                    return true;
                }
            } catch (e) {
                document.getElementById('blog-status').textContent = '异常';
                document.getElementById('blog-status').className = 'status-badge offline';
            }
            return false;
        }

        // 加载日志
        async function loadLogs() {
            const logContent = document.getElementById('log-content');
            const now = new Date().toLocaleTimeString('zh-CN');
            
            logContent.innerHTML = `
                <div class="log-line log-success">
                    <span class="log-time">[${now}]</span>
                    <span>系统状态检查完成</span>
                </div>
                <div class="log-line">
                    <span class="log-time">[${now}]</span>
                    <span>HTTP 服务器：8080 端口监听中</span>
                </div>
                <div class="log-line">
                    <span class="log-time">[${now}]</span>
                    <span>Ngrok 隧道：正常运行</span>
                </div>
                <div class="log-line">
                    <span class="log-time">[${now}]</span>
                    <span>博客系统：${document.getElementById('blog-count').textContent}</span>
                </div>
                <div class="log-line">
                    <span class="log-time">[${now}]</span>
                    <span>监控脚本：30 秒检查间隔</span>
                </div>
            `;
            
            document.getElementById('last-update').textContent = now;
            document.getElementById('monitor-last').textContent = now;
        }

        // 刷新状态
        async function refreshStatus() {
            const btn = event.target.closest('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 检查中...';
            
            await Promise.all([
                checkHttpServer(),
                checkNgrok(),
                checkBlog()
            ]);
            
            loadLogs();
            
            btn.innerHTML = '<i class="fas fa-check"></i> 已更新';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> 刷新状态';
            }, 2000);
        }

        // 刷新日志
        function refreshLogs() {
            loadLogs();
        }

        // 页面加载时检查
        window.addEventListener('load', async () => {
            await Promise.all([
                checkHttpServer(),
                checkNgrok(),
                checkBlog()
            ]);
            loadLogs();
        });
    </script>
</body>
</html>

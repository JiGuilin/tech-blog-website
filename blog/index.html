<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ngrok-skip-browser-warning" content="true">
    <meta name="description" content="技术博客文章列表 - 每日更新 GitHub Trending 和 Hacker News 热门项目">
    <meta name="keywords" content="技术博客，GitHub, Hacker News, 文章列表">
    <meta property="og:title" content="技术博客 | Tech Blog">
    <meta property="og:description" content="每日更新技术资讯">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>技术博客 | Tech Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <!-- 页面加载进度条 -->
    <div class="page-progress" id="page-progress"></div>
    
    <!-- 导航栏 -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <img src="../avatar.jpg" alt="Logo" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent);">
                <span>MyBlog</span>
            </a>
            <ul class="nav-links">
                <li><a href="../index.html#about">关于</a></li>
                <li><a href="../index.html#projects">项目</a></li>
                <li><a href="index.html" style="color: var(--accent);">博客</a></li>
                <li><a href="tags.html">标签</a></li>
                <li><a href="../rss.xml" target="_blank" title="RSS 订阅"><i class="fas fa-rss"></i></a></li>
            </ul>
            <button class="theme-toggle" id="theme-toggle" title="切换主题 (T)">
                <i class="fas fa-sun"></i>
                <i class="fas fa-moon"></i>
                <span id="theme-text">深色</span>
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- 页面头部 -->
        <header class="page-header">
            <h1>📝 技术博客</h1>
            <p>每日更新最新技术资讯 · GitHub Trending · Hacker News</p>
        </header>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-posts">0</div>
                <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-github">0</div>
                <div class="stat-label">GitHub 项目</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-hn">0</div>
                <div class="stat-label">HN 新闻</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="update-days">0</div>
                <div class="stat-label">更新天数</div>
            </div>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="search-input" placeholder="搜索文章标题或内容...">
        </div>

        <!-- 博客列表 -->
        <div class="blog-list" id="blog-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载文章列表...</p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 我的个人博客 · Powered by OpenClaw</p>
        <div class="footer-links">
            <a href="https://github.com/JiGuilin" target="_blank">GitHub</a>
            <a href="../index.html#blog">返回首页</a>
            <a href="README.md" target="_blank">关于本站</a>
            <a href="archive.html">文章归档</a>
        </div>
    </footer>

    <!-- 功能由 js/main.js 提供 -->
    <script src="../js/blog.js"></script>
</body>
</html>

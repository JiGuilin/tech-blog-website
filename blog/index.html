<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ngrok-skip-browser-warning" content="true">
    <meta name="description" content="技术博客文章列表 - 每日更新 GitHub Trending 和 Hacker News 热门项目">
    <meta name="keywords" content="技术博客，GitHub, Hacker News, 文章列表">
    <meta property="og:title" content="技术博客 | Tech Blog">
    <meta property="og:description" content="每日更新技术资讯">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>技术博客 | Tech Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success: #3fb950;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* 背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at top, rgba(88, 166, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(118, 75, 162, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 1rem 2rem;
            transition: all 0.3s;
        }
        
        nav.scrolled {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.3s;
        }
        
        .logo:hover {
            transform: translateX(-5px);
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient);
            transition: width 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        /* 主题切换按钮 */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .theme-toggle:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }
        
        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        
        /* 页面头部 */
        .page-header {
            text-align: center;
            margin-bottom: 4rem;
            padding: 3rem 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
        }
        
        .page-header h1 {
            font-size: 3rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        
        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient);
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        
        .stat-card:hover::before {
            transform: scaleX(1);
        }
        
        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }
        
        /* 搜索框 */
        .search-box {
            max-width: 600px;
            margin: 0 auto 3rem;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        
        /* 博客列表 */
        .blog-list {
            display: grid;
            gap: 2rem;
        }
        
        .blog-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .blog-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--gradient);
            transform: scaleY(0);
            transition: transform 0.3s;
        }
        
        .blog-item:hover {
            border-color: var(--accent);
            transform: translateX(10px);
        }
        
        .blog-item:hover::before {
            transform: scaleY(1);
        }
        
        .blog-date {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 20px;
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        
        .blog-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
            transition: color 0.3s;
        }
        
        .blog-item:hover .blog-title {
            color: var(--accent);
        }
        
        .blog-excerpt {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }
        
        .blog-meta {
            display: flex;
            gap: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .read-more:hover {
            color: var(--accent-hover);
            gap: 1rem;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        /* 页脚 */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 4rem;
        }
        
        footer p {
            color: var(--text-secondary);
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }
        
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .footer-links a:hover {
            color: var(--accent);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .page-header h1 { font-size: 2rem; }
            .nav-links { display: none; }
            .stats { grid-template-columns: 1fr; }
            .blog-meta { flex-direction: column; gap: 0.5rem; }
            .container { padding: 6rem 1rem 2rem; }
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 4rem;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <img src="../avatar.jpg" alt="Logo" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent);">
                <span>MyBlog</span>
            </a>
            <ul class="nav-links">
                <li><a href="../index.html#about">关于</a></li>
                <li><a href="../index.html#projects">项目</a></li>
                <li><a href="index.html" style="color: var(--accent);">博客</a></li>
                <li><a href="../index.html#contact">联系</a></li>
            </ul>
            <button class="theme-toggle" id="theme-toggle" title="切换主题 (T)">
                <i class="fas fa-sun"></i>
                <i class="fas fa-moon"></i>
                <span id="theme-text">深色</span>
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- 页面头部 -->
        <header class="page-header">
            <h1>📝 技术博客</h1>
            <p>每日更新最新技术资讯 · GitHub Trending · Hacker News</p>
        </header>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-posts">0</div>
                <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-github">0</div>
                <div class="stat-label">GitHub 项目</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-hn">0</div>
                <div class="stat-label">HN 新闻</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="update-days">0</div>
                <div class="stat-label">更新天数</div>
            </div>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="search-input" placeholder="搜索文章标题或内容...">
        </div>

        <!-- 博客列表 -->
        <div class="blog-list" id="blog-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载文章列表...</p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 我的个人博客 · Powered by OpenClaw</p>
        <div class="footer-links">
            <a href="https://github.com/JiGuilin" target="_blank">GitHub</a>
            <a href="../index.html#blog">返回首页</a>
            <a href="README.md" target="_blank">关于本站</a>
            <a href="archive.html">文章归档</a>
        </div>
    </footer>

    <script>
        let blogPosts = [];

        // 导航栏滚动效果
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // 加载博客列表
        async function loadBlogList() {
            try {
                const response = await fetch('blog-list.json');
                if (response.ok) {
                    blogPosts = await response.json();
                    renderBlogList(blogPosts);
                    updateStats(blogPosts);
                } else {
                    showEmptyState();
                }
            } catch (e) {
                console.error('加载失败:', e);
                showEmptyState();
            }
        }

        // 更新统计
        function updateStats(posts) {
            const setElement = (id, value) => {
                const el = document.getElementById(id);
                if (el) el.textContent = value;
            };
            
            setElement('total-posts', posts.length);
            setElement('update-days', posts.length);
            
            const totalGithub = posts.reduce((sum, post) => sum + (post.githubCount || 10), 0);
            const totalHn = posts.reduce((sum, post) => sum + (post.hnCount || 10), 0);
            const totalWords = posts.reduce((sum, post) => sum + (post.words || 0), 0);
            
            setElement('total-github', totalGithub);
            setElement('total-hn', totalHn);
            setElement('total-words', totalWords.toLocaleString());
            setElement('blog-count', posts.length);
        }

        // 渲染列表
        function renderBlogList(posts) {
            const blogListEl = document.getElementById('blog-list');
            
            if (!blogListEl) {
                console.error('未找到 blog-list 元素');
                return;
            }
            
            if (!posts || posts.length === 0) {
                showEmptyState();
                return;
            }

            blogListEl.innerHTML = posts.map((post, index) => `
                <div class="blog-item" style="animation-delay: ${index * 0.1}s">
                    <span class="blog-date">
                        <i class="far fa-calendar"></i> ${post.date}
                    </span>
                    <h2 class="blog-title">${post.title}</h2>
                    <p class="blog-excerpt">${post.excerpt}</p>
                    <div class="blog-meta">
                        <div class="meta-item">
                            <i class="fab fa-github"></i>
                            <span>${post.githubCount || 10} GitHub 项目</span>
                        </div>
                        <div class="meta-item">
                            <i class="fas fa-newspaper"></i>
                            <span>${post.hnCount || 10} HN 新闻</span>
                        </div>
                    </div>
                    <a href="${post.url}" class="read-more">
                        阅读全文
                        <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            `).join('');
        }

        // 空状态
        function showEmptyState() {
            document.getElementById('blog-list').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <h3>暂无文章</h3>
                    <p>博客系统已就绪，明天早上 9:00 将发布第一篇文章</p>
                </div>
            `;
            document.getElementById('total-posts').textContent = '0';
        }

        // 搜索功能
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                renderBlogList(blogPosts);
                return;
            }
            
            const filtered = blogPosts.filter(post => 
                post.title.toLowerCase().includes(query) ||
                post.excerpt.toLowerCase().includes(query) ||
                post.date.includes(query)
            );
            
            renderBlogList(filtered);
        });

        document.addEventListener('DOMContentLoaded', loadBlogList);
        
        // ========== 主题切换功能 ==========
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const hour = new Date().getHours();
            let defaultTheme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
            if (savedTheme) {
                setTheme(savedTheme, false);
            } else {
                setTheme(defaultTheme, false);
            }
            updateThemeText();
        }
        
        function setTheme(theme, save = true) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            if (save) {
                localStorage.setItem('theme', theme);
                updateThemeText();
            }
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }
        
        function updateThemeText() {
            const themeText = document.getElementById('theme-text');
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (themeText) {
                themeText.textContent = currentTheme === 'light' ? '浅色' : '深色';
            }
        }
        
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', toggleTheme);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 't' || e.key === 'T') {
                e.preventDefault();
                toggleTheme();
            }
        });
        
        initTheme();
    </script>
</body>
</html>

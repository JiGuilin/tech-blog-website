<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="博客文章标签云 - 按标签浏览文章">
    <meta name="keywords" content="标签，分类，技术博客">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>标签云 | Tags - 我的个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-card: #ffffff;
            --text-primary: #24292f;
            --text-secondary: #57606a;
            --accent: #0969da;
            --border: #d0d7de;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 1rem 2rem;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        
        /* 主题切换按钮 */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .theme-toggle:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .page-title {
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        
        .page-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        /* 标签云 */
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 4rem;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .tag-item:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(88, 166, 255, 0.3);
        }
        
        .tag-item .tag-name {
            font-size: 1rem;
            font-weight: 500;
        }
        
        .tag-item .tag-count {
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
        }
        
        .tag-item:hover .tag-count {
            background: rgba(0, 0, 0, 0.15);
        }
        
        /* 标签大小（根据文章数量） */
        .tag-size-1 { font-size: 0.9rem; padding: 0.5rem 1rem; }
        .tag-size-2 { font-size: 1rem; padding: 0.6rem 1.1rem; }
        .tag-size-3 { font-size: 1.1rem; padding: 0.7rem 1.2rem; }
        .tag-size-4 { font-size: 1.2rem; padding: 0.8rem 1.3rem; }
        .tag-size-5 { font-size: 1.3rem; padding: 0.9rem 1.4rem; }
        
        /* 标签文章列表 */
        .tag-section {
            margin-bottom: 3rem;
        }
        
        .tag-section-header {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .tag-section-header i {
            color: var(--accent);
        }
        
        .tag-posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }
        
        .post-title {
            font-size: 1.2rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }
        
        .post-excerpt {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .post-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .post-meta i {
            margin-right: 0.3rem;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 6rem 1rem 2rem; }
            .page-title { font-size: 2rem; }
            .tag-posts-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <img src="../avatar.jpg" alt="Logo" class="logo-avatar" onerror="this.style.display='none'">
                <span>MyBlog</span>
            </a>
            <ul class="nav-links">
                <li><a href="../index.html#about">关于</a></li>
                <li><a href="../index.html#projects">项目</a></li>
                <li><a href="index.html" style="color: var(--accent);">博客</a></li>
                <li><a href="tags.html">标签</a></li>
            </ul>
            <button class="theme-toggle" id="theme-toggle" title="切换主题 (T)">
                <i class="fas fa-sun"></i>
                <i class="fas fa-moon"></i>
                <span id="theme-text">深色</span>
            </button>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">🏷️ 标签云</h1>
            <p class="page-desc">按标签浏览文章，发现更多精彩内容</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-tags">0</div>
                <div class="stat-label">标签总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-posts">0</div>
                <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-tags">0</div>
                <div class="stat-label">平均每篇标签数</div>
            </div>
        </div>

        <!-- 标签云 -->
        <div class="tag-cloud" id="tag-cloud">
            <!-- 动态生成 -->
        </div>

        <!-- 标签文章列表 -->
        <div id="tag-posts-container">
            <!-- 动态生成 -->
        </div>
    </div>

    <script>
        // 加载博客文章
        let blogPosts = [];

        async function loadBlogPosts() {
            try {
                const response = await fetch('blog-list.json');
                blogPosts = await response.json();
                generateTagCloud();
                updateStats();
            } catch (e) {
                console.error('加载博客列表失败:', e);
            }
        }

        // 生成标签云
        function generateTagCloud() {
            const tagCount = {};
            
            // 统计每个标签的文章数量
            blogPosts.forEach(post => {
                const tags = post.tags || [];
                tags.forEach(tag => {
                    tagCount[tag] = (tagCount[tag] || 0) + 1;
                });
            });
            
            // 转换为数组并排序
            const tagsArray = Object.entries(tagCount)
                .sort((a, b) => b[1] - a[1]);
            
            // 生成标签云 HTML
            const tagCloud = document.getElementById('tag-cloud');
            const maxCount = tagsArray.length > 0 ? tagsArray[0][1] : 1;
            
            tagCloud.innerHTML = tagsArray.map(([tag, count]) => {
                const size = Math.ceil(count / maxCount * 5);
                return `
                    <a href="#tag-${tag}" class="tag-item tag-size-${size}">
                        <span class="tag-name">${tag}</span>
                        <span class="tag-count">${count}</span>
                    </a>
                `.trim();
            }).join('');
            
            // 生成标签文章列表
            generateTagPosts(tagsArray);
        }

        // 生成标签文章列表
        function generateTagPosts(tagsArray) {
            const container = document.getElementById('tag-posts-container');
            
            container.innerHTML = tagsArray.map(([tag, count]) => `
                <div class="tag-section" id="tag-${tag}">
                    <h2 class="tag-section-header">
                        <i class="fas fa-tag"></i>
                        <span>${tag}</span>
                        <span style="color: var(--text-secondary); font-size: 1rem;">(${count}篇)</span>
                    </h2>
                    <div class="tag-posts-grid">
                        ${blogPosts
                            .filter(post => post.tags && post.tags.includes(tag))
                            .map(post => `
                                <a href="view.html?id=${post.id}" class="post-card">
                                    <h3 class="post-title">${post.title}</h3>
                                    <p class="post-excerpt">${post.excerpt}</p>
                                    <div class="post-meta">
                                        <span><i class="far fa-calendar"></i> ${post.date}</span>
                                        <span><i class="fas fa-chart-line"></i> ${post.wordCount || 0}字</span>
                                    </div>
                                </a>
                            `.trim())
                            .join('')}
                    </div>
                </div>
            `.trim()).join('');
        }

        // 更新统计
        function updateStats() {
            const tagCount = {};
            blogPosts.forEach(post => {
                (post.tags || []).forEach(tag => {
                    tagCount[tag] = (tagCount[tag] || 0) + 1;
                });
            });
            
            const totalTags = Object.keys(tagCount).length;
            const totalPosts = blogPosts.length;
            const totalTagUsage = Object.values(tagCount).reduce((a, b) => a + b, 0);
            const avgTags = totalPosts > 0 ? (totalTagUsage / totalPosts).toFixed(1) : 0;
            
            document.getElementById('total-tags').textContent = totalTags;
            document.getElementById('total-posts').textContent = totalPosts;
            document.getElementById('avg-tags').textContent = avgTags;
        }

        // 主题切换
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const hour = new Date().getHours();
            let defaultTheme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
            if (savedTheme) {
                setTheme(savedTheme, false);
            } else {
                setTheme(defaultTheme, false);
            }
            updateThemeText();
        }
        
        function setTheme(theme, save = true) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            if (save) {
                localStorage.setItem('theme', theme);
                updateThemeText();
            }
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }
        
        function updateThemeText() {
            const themeText = document.getElementById('theme-text');
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (themeText) {
                themeText.textContent = currentTheme === 'light' ? '浅色' : '深色';
            }
        }
        
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', toggleTheme);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 't' || e.key === 'T') {
                e.preventDefault();
                toggleTheme();
            }
        });
        
        initTheme();
        loadBlogPosts();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ngrok-skip-browser-warning" content="true">
    <title>文章归档 | Archive</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/archive.css">
    <style>
        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 6rem 1rem 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 返回导航 -->
        <a href="/" class="back-nav">
            <i class="fas fa-arrow-left"></i>
            返回首页
        </a>

        <!-- 页面头部 -->
        <header class="page-header">
            <h1><i class="fas fa-archive"></i> 文章归档</h1>
            <p>按时间排序的所有技术文章</p>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-posts">0</div>
                <div class="stat-label">总文章数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-words">0</div>
                <div class="stat-label">总字数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="first-post">-</div>
                <div class="stat-label">首篇文章</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="latest-post">-</div>
                <div class="stat-label">最新文章</div>
            </div>
        </div>

        <!-- 归档列表 -->
        <div class="archive-list" id="archive-list">
            <!-- 动态加载 -->
        </div>

        <!-- 页脚 -->
        <footer>
            <p>© 2026 技术博客自动化系统 · 文章归档</p>
            <p style="margin-top: 0.5rem; font-size: 0.85rem;">
                最后更新：<span id="last-update">-</span>
            </p>
        </footer>
    </div>

    <script>
        // 加载归档
        async function loadArchive() {
            try {
                const response = await fetch('blog-list.json');
                const posts = await response.json();

                // 更新统计
                document.getElementById('total-posts').textContent = posts.length;
                
                const totalWords = posts.reduce((sum, post) => sum + (post.words || 0), 0);
                document.getElementById('total-words').textContent = totalWords.toLocaleString();
                
                if (posts.length > 0) {
                    document.getElementById('first-post').textContent = posts[posts.length - 1].date.split('-').slice(1).join('/');
                    document.getElementById('latest-post').textContent = posts[0].date.split('-').slice(1).join('/');
                }

                // 生成归档列表
                const archiveList = document.getElementById('archive-list');
                archiveList.innerHTML = posts.map(post => `
                    <a href="view.html?file=${post.file}" class="archive-item">
                        <div class="archive-date">${post.date}</div>
                        <div class="archive-info">
                            <div class="archive-title">${post.title}</div>
                            <div class="archive-meta">
                                <span><i class="fas fa-file-word"></i> ${post.words || 0} 字</span>
                                <span><i class="fas fa-tags"></i> ${post.tags || '技术资讯'}</span>
                                <span><i class="fas fa-calendar"></i> ${post.date}</span>
                            </div>
                        </div>
                        <div class="archive-icon">📰</div>
                    </a>
                `).join('');

                // 更新页脚
                document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
            } catch (error) {
                console.error('加载归档失败:', error);
                document.getElementById('archive-list').innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <p>加载归档失败，请稍后重试</p>
                    </div>
                `;
            }
        }

        // 页面加载时初始化
        window.addEventListener('load', loadArchive);
    </script>
</body>
</html>

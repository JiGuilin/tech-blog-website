<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ngrok-skip-browser-warning" content="true">
    <meta name="description" content="技术博客文章阅读 - 深度技术内容分享">
    <meta name="keywords" content="技术博客，文章阅读，编程">
    <meta property="og:title" content="博客文章">
    <meta property="og:description" content="深度技术内容分享">
    <meta property="og:type" content="article">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>博客文章</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/article.css">
    <!-- 本地托管 marked.js -->
    <script src="../js/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success: #3fb950;
            --warning: #d29922;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* 顶部进度条 */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--gradient);
            z-index: 9999;
            transition: width 0.1s;
        }
        
        /* 文章目录 */
        .toc-container {
            position: fixed;
            top: 100px;
            right: 2rem;
            width: 250px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            z-index: 999;
            display: none;
        }
        
        .toc-container.show {
            display: block;
        }
        
        .toc-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .toc-title i {
            color: var(--accent);
        }
        
        .toc-list {
            list-style: none;
        }
        
        .toc-list li {
            margin-bottom: 0.5rem;
        }
        
        .toc-list a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            display: block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .toc-list a:hover {
            color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }
        
        .toc-list a.active {
            color: var(--accent);
            background: rgba(88, 166, 255, 0.15);
            font-weight: 500;
        }
        
        .toc-h2 {
            padding-left: 0;
        }
        
        .toc-h3 {
            padding-left: 1rem;
        }
        
        .toc-h4 {
            padding-left: 2rem;
            font-size: 0.8rem;
        }
        
        /* 阅读时间 */
        .reading-time {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            background: var(--bg-card);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        
        .reading-time i {
            color: var(--accent);
        }
        
        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 1rem 2rem;
            transition: all 0.3s;
        }
        
        nav.scrolled {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.3s;
        }
        
        .logo:hover {
            transform: translateX(-5px);
        }
        
        .logo-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }
        
        /* 主题切换按钮 */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .theme-toggle:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        /* 主容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }
        
        /* 文章头部 */
        .article-header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 3rem 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .article-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
        }
        
        .article-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 20px;
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        
        .article-title {
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1.3;
        }
        
        .article-meta {
            display: flex;
            justify-content: center;
            gap: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* 文章内容 */
        .article {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            margin-bottom: 2rem;
        }
        
        .article-content {
            line-height: 1.8;
        }
        
        .article-content h1 {
            font-size: 2rem;
            color: var(--text-primary);
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
        }
        
        .article-content h2 {
            color: var(--accent);
            margin: 2rem 0 1rem;
            font-size: 1.6rem;
            position: relative;
            padding-left: 1rem;
        }
        
        .article-content h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 1.6rem;
            background: var(--gradient);
            border-radius: 2px;
        }
        
        .article-content h3 {
            color: var(--text-primary);
            margin: 1.5rem 0 0.5rem;
            font-size: 1.3rem;
        }
        
        .article-content p {
            margin: 1rem 0;
        }
        
        .article-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        
        .article-content a:hover {
            border-bottom-color: var(--accent);
        }
        
        .article-content ul, .article-content ol {
            margin: 1rem 0 1rem 2rem;
        }
        
        .article-content li {
            margin: 0.5rem 0;
            position: relative;
        }
        
        .article-content blockquote {
            border-left: 4px solid var(--accent);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            background: rgba(88, 166, 255, 0.05);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
        }
        
        .article-content blockquote p:last-child {
            margin-bottom: 0;
        }
        
        .article-content code {
            background: var(--bg-secondary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
            color: var(--accent-hover);
        }
        
        .article-content pre {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
            border: 1px solid var(--border);
        }
        
        .article-content pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
        }
        
        .article-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1.5rem 0;
        }
        
        .article-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }
        
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }
        
        .article-content th, .article-content td {
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            text-align: left;
        }
        
        .article-content th {
            background: var(--bg-secondary);
            color: var(--accent);
        }
        
        .article-content tr:hover {
            background: rgba(88, 166, 255, 0.05);
        }
        
        /* 底部导航 */
        .article-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }
        
        .share-buttons {
            display: flex;
            gap: 1rem;
        }
        
        .share-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .share-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            transform: translateY(-3px);
        }
        
        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(88, 166, 255, 0.4);
        }
        
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 30px rgba(88, 166, 255, 0.6);
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 代码块语言标签 */
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.25rem 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 6rem 1rem 2rem; }
            .article { padding: 1.5rem; }
            .article-title { font-size: 1.8rem; }
            .article-meta { flex-direction: column; gap: 0.5rem; }
            .article-footer { flex-direction: column; gap: 1rem; }
            nav { padding: 0.75rem 1rem; }
            .back-btn span { display: none; }
        }
        
        /* 打印样式 */
        @media print {
            nav, .back-to-top, .share-buttons { display: none; }
            .container { padding: 2rem; }
            .article { box-shadow: none; }
        }
    </style>
</head>
<body>
    <!-- 进度条 -->
    <div class="progress-bar" id="progress-bar"></div>
    
    <!-- 导航栏 -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <img src="../avatar.jpg" alt="Logo" class="logo-avatar" onerror="this.style.display='none'">
                <span>MyBlog</span>
            </a>
            <div class="nav-right">
                <button class="theme-toggle" id="theme-toggle" title="切换主题 (T)" style="margin-right: 1rem;">
                    <i class="fas fa-sun"></i>
                    <i class="fas fa-moon"></i>
                    <span id="theme-text">深色</span>
                </button>
                <a href="index.html" class="back-btn">
                    <i class="fas fa-list"></i>
                    <span>博客列表</span>
                </a>
                <a href="../index.html" class="back-btn">
                    <i class="fas fa-home"></i>
                    <span>首页</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 文章目录 -->
        <div class="toc-container" id="toc-container">
            <div class="toc-title">
                <i class="fas fa-list"></i>
                <span>文章目录</span>
            </div>
            <ul class="toc-list" id="toc-list">
                <!-- 动态生成 -->
            </ul>
        </div>
        
        <!-- 文章头部 -->
        <header class="article-header" id="article-header">
            <span class="article-badge">
                <i class="fas fa-newspaper"></i> 技术日报
            </span>
            <h1 class="article-title" id="article-title">加载中...</h1>
            <div class="article-meta" id="article-meta">
                <div class="meta-item">
                    <i class="far fa-calendar"></i>
                    <span style="margin-right: 0.3rem; color: var(--accent);">日期:</span>
                    <span id="publish-date">-</span>
                </div>
                <div class="meta-item">
                    <i class="fas fa-tags"></i>
                    <span style="margin-right: 0.3rem; color: var(--accent);">标签:</span>
                    <span id="article-tags">技术资讯</span>
                </div>
                <div class="meta-item">
                    <i class="fas fa-chart-line"></i>
                    <span style="margin-right: 0.3rem; color: var(--accent);">字数:</span>
                    <span id="word-count">0 字</span>
                </div>
                <div class="meta-item">
                    <i class="fas fa-clock"></i>
                    <span style="margin-right: 0.3rem; color: var(--accent);">阅读:</span>
                    <span id="reading-time" class="reading-time">
                        <i class="fas fa-hourglass-half"></i>
                        <span id="reading-time-value">-</span>
                    </span>
                </div>
            </div>
        </header>

        <!-- 文章内容 -->
        <article class="article">
            <div class="article-content" id="article-content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载文章...</p>
                </div>
            </div>
            
            <!-- 文章底部 -->
            <footer class="article-footer">
                <div class="share-buttons">
                    <button class="share-btn" onclick="copyLink()" title="复制链接">
                        <i class="fas fa-link"></i>
                    </button>
                    <button class="share-btn" onclick="shareToWeixin()" title="分享到微信">
                        <i class="fab fa-weixin"></i>
                    </button>
                    <button class="share-btn" onclick="shareToWeibo()" title="分享到微博">
                        <i class="fab fa-weibo"></i>
                    </button>
                    <button class="share-btn" onclick="shareToTwitter()" title="分享到 Twitter">
                        <i class="fab fa-twitter"></i>
                    </button>
                    <button class="share-btn" onclick="window.print()" title="打印">
                        <i class="fas fa-print"></i>
                    </button>
                </div>
                <div style="color: var(--text-secondary); font-size: 0.9rem;">
                    <i class="fas fa-robot"></i> 本文由自动化脚本生成
                </div>
            </footer>
        </article>
    </div>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="back-to-top" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="../js/article.js"></script>
</body>
</html>

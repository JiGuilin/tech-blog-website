<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="ngrok-skip-browser-warning" content="true">
    <meta name="description" content="技术博客文章阅读 - 深度技术内容分享">
    <meta name="keywords" content="技术博客，文章阅读，编程">
    <meta property="og:title" content="博客文章">
    <meta property="og:description" content="深度技术内容分享">
    <meta property="og:type" content="article">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>博客文章</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/article.css">
    <!-- 本地托管 marked.js -->
    <script src="../js/marked.min.js"></script>
</head>
<body>
    <!-- 进度条 -->
    <div class="progress-bar" id="progress-bar"></div>
    
    <!-- 导航栏 -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <img src="../avatar.jpg" alt="Logo" class="logo-avatar" onerror="this.style.display='none'">
                <span>MyBlog</span>
            </a>
            <div class="nav-right">
                <button class="theme-toggle" id="theme-toggle" title="切换主题 (T)" style="margin-right: 1rem;">
                    <i class="fas fa-sun"></i>
                    <i class="fas fa-moon"></i>
                    <span id="theme-text">深色</span>
                </button>
                <a href="index.html" class="back-btn">
                    <i class="fas fa-list"></i>
                    <span>博客列表</span>
                </a>
                <a href="../index.html" class="back-btn">
                    <i class="fas fa-home"></i>
                    <span>首页</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 文章目录 -->
        <div class="toc-container" id="toc-container">
            <div class="toc-title">
                <i class="fas fa-list"></i>
                <span>文章目录</span>
            </div>
            <ul class="toc-list" id="toc-list">
                <!-- 动态生成 -->
            </ul>
        </div>
        
        <!-- 文章头部 -->
        <header class="article-header" id="article-header">
            <span class="article-badge">
                <i class="fas fa-newspaper"></i> 技术日报
            </span>
            <h1 class="article-title" id="article-title">加载中...</h1>
            <div class="article-meta" id="article-meta">
                <div class="meta-item">
                    <i class="far fa-calendar"></i>
                    <span style="margin-right: 0.3rem; color: var(--accent);">日期:</span>
                    <span id="publish-date">-</span>
                </div>
                <div class="meta-item">
                    <i class="fas fa-tags"></i>
                    <span style="margin-right: 0.3rem; color: var(--accent);">标签:</span>
                    <span id="article-tags">技术资讯</span>
                </div>
                <div class="meta-item">
                    <i class="fas fa-chart-line"></i>
                    <span style="margin-right: 0.3rem; color: var(--accent);">字数:</span>
                    <span id="word-count">0 字</span>
                </div>
                <div class="meta-item">
                    <i class="fas fa-clock"></i>
                    <span style="margin-right: 0.3rem; color: var(--accent);">阅读:</span>
                    <span id="reading-time" class="reading-time">
                        <i class="fas fa-hourglass-half"></i>
                        <span id="reading-time-value">-</span>
                    </span>
                </div>
            </div>
        </header>

        <!-- 文章内容 -->
        <article class="article">
            <div class="article-content" id="article-content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载文章...</p>
                </div>
            </div>
            
            <!-- 文章底部 -->
            <footer class="article-footer">
                <div class="share-buttons">
                    <button class="share-btn" onclick="copyLink()" title="复制链接">
                        <i class="fas fa-link"></i>
                    </button>
                    <button class="share-btn" onclick="shareToWeixin()" title="分享到微信">
                        <i class="fab fa-weixin"></i>
                    </button>
                    <button class="share-btn" onclick="shareToWeibo()" title="分享到微博">
                        <i class="fab fa-weibo"></i>
                    </button>
                    <button class="share-btn" onclick="shareToTwitter()" title="分享到 Twitter">
                        <i class="fab fa-twitter"></i>
                    </button>
                    <button class="share-btn" onclick="window.print()" title="打印">
                        <i class="fas fa-print"></i>
                    </button>
                </div>
                <div style="color: var(--text-secondary); font-size: 0.9rem;">
                    <i class="fas fa-robot"></i> 本文由自动化脚本生成 | 最后更新：<span id="footer-update-time"></span>
                </div>
            </footer>
        </article>
    </div>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="back-to-top" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="../js/article.js"></script>
</body>
</html>
